<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Live Scenario · Bekwaamheidsdossier</title>
<style>
:root {
  --bg:#191e2a; --bg-deep:#0f131c; --panel:#2e3a50; --panel-sub:#243044;
  --border:#3e5070; --border-hi:#6890b8;
  --text:#e8f0f8; --text-dim:#a0bacc; --text-bright:#f8fcff; --text-muted:#60788e; --label:#b8d4e8;
  --green:#28f076; --green-bg:#122e1e; --amber:#ffc840; --amber-bg:#2e1e06;
  --red:#ff4438; --red-bg:#2e1010; --blue:#52c0f8; --blue-bg:#0c2240;
  --cyan:#00e8ff; --cyan-bg:#082c3a; --purple:#a78bfa; --purple-bg:#2e1e4e;
  --sans:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Helvetica Neue",Arial,sans-serif;
  --mono:"SF Mono",Menlo,Consolas,monospace;
}
* { box-sizing:border-box; }
html,body { margin:0; padding:0; min-height:100%; background:var(--bg-deep); color:var(--text);
  font-family:var(--sans); font-size:14px; line-height:1.5; }
button { font-family:inherit; cursor:pointer; }
h1,h2,h3 { margin:0; font-weight:600; color:var(--text-bright); }

/* ── Topbar ── */
#topbar { display:flex; align-items:center; gap:16px; padding:14px 22px;
  background:var(--bg); border-bottom:1px solid var(--border); position:sticky; top:0; z-index:20; }
#brand { display:flex; flex-direction:column; }
#brand .t { font-size:16px; font-weight:700; color:var(--text-bright); letter-spacing:.2px; }
#brand .s { font-size:11px; font-family:var(--mono); color:var(--cyan); text-transform:uppercase; letter-spacing:1px; }
#topstats { font-family:var(--mono); font-size:12px; color:var(--text-dim); margin-left:8px; }
#topbar .spacer { flex:1; }
.btn { background:var(--panel); color:var(--text); border:1px solid var(--border);
  border-radius:6px; padding:8px 14px; font-size:13px; transition:.12s; }
.btn:hover { border-color:var(--cyan); color:var(--text-bright); }
.btn.primary { background:var(--blue); color:var(--bg-deep); border-color:var(--blue); font-weight:600; }
.btn.primary:hover { background:var(--cyan); border-color:var(--cyan); }
.btn.ghost { background:transparent; }
.btn.danger:hover { border-color:var(--red); color:var(--red); }
#lang-toggle { display:flex; gap:2px; margin-left:2px; }
.lang-btn { background:var(--panel); color:var(--text-dim); border:1px solid var(--border);
  border-radius:6px; padding:7px 10px; font-size:12px; font-family:var(--mono); }
.lang-btn.active { color:var(--cyan); border-color:var(--cyan); }

/* ── Tabs ── */
#tabs { display:flex; gap:6px; padding:12px 22px 0; background:var(--bg); }
.tab { background:transparent; color:var(--text-dim); border:1px solid transparent; border-bottom:none;
  border-radius:8px 8px 0 0; padding:10px 18px; font-size:13px; font-weight:600; }
.tab.active { background:var(--bg-deep); color:var(--cyan); border-color:var(--border); }
.tab:hover:not(.active) { color:var(--text-bright); }

/* ── Layout ── */
#main { padding:22px; max-width:1280px; margin:0 auto; }
.hidden { display:none !important; }

/* ── Empty / import ── */
#empty { text-align:center; padding:70px 20px; }
#drop { max-width:560px; margin:24px auto 0; border:2px dashed var(--border-hi); border-radius:14px;
  padding:46px 24px; background:var(--panel-sub); transition:.15s; }
#drop.over { border-color:var(--cyan); background:var(--cyan-bg); }
#drop .ico { font-size:42px; }
#drop h3 { margin:10px 0 6px; font-size:18px; }
#drop p { color:var(--text-dim); margin:4px 0; font-size:13px; }
.empty-hint { color:var(--text-muted); font-family:var(--mono); font-size:11px; margin-top:18px; }

/* ── Cards / panels ── */
.panel { background:var(--panel-sub); border:1px solid var(--border); border-radius:12px; padding:18px 20px; margin-bottom:18px; }
.panel > h2 { font-size:14px; text-transform:uppercase; letter-spacing:.6px; color:var(--label);
  margin-bottom:14px; font-family:var(--mono); font-weight:600; }
.row { display:flex; gap:18px; flex-wrap:wrap; }
.col { flex:1; min-width:0; }

/* ── KPI cards ── */
.kpis { display:grid; grid-template-columns:repeat(auto-fit,minmax(150px,1fr)); gap:14px; }
.kpi { background:var(--panel); border:1px solid var(--border); border-radius:10px; padding:14px 16px; }
.kpi .v { font-size:26px; font-weight:700; color:var(--text-bright); line-height:1.1; }
.kpi .l { font-size:11px; color:var(--text-dim); text-transform:uppercase; letter-spacing:.5px; font-family:var(--mono); margin-top:4px; }
.kpi .sub { font-size:11px; color:var(--text-muted); margin-top:2px; }

/* ── Behaviour chips ── */
.chip { display:inline-flex; align-items:center; gap:6px; padding:3px 10px; border-radius:20px;
  font-size:11px; font-weight:700; font-family:var(--mono); letter-spacing:.3px; }
.chip.reactive    { background:var(--red-bg);   color:var(--red);   border:1px solid var(--red); }
.chip.aware       { background:var(--amber-bg); color:var(--amber); border:1px solid var(--amber); }
.chip.proactive   { background:var(--blue-bg);  color:var(--blue);  border:1px solid var(--blue); }
.chip.in-control  { background:var(--green-bg); color:var(--green); border:1px solid var(--green); }
.chip.muted       { background:var(--panel);    color:var(--text-muted); border:1px solid var(--border); }
.vbadge { display:inline-block; padding:2px 8px; border-radius:5px; font-size:10px; font-family:var(--mono);
  font-weight:700; letter-spacing:.5px; background:var(--panel); color:var(--text-dim); border:1px solid var(--border); }
.vbadge.cro { color:var(--cyan); border-color:var(--cyan); }
.vbadge.field { color:var(--green); border-color:var(--green); }
.vbadge.technical { color:var(--purple); border-color:var(--purple); }

/* ── Person list ── */
#ind-layout { display:grid; grid-template-columns:300px 1fr; gap:18px; align-items:start; }
#person-search { width:100%; background:var(--panel); border:1px solid var(--border); color:var(--text);
  border-radius:6px; padding:8px 10px; font-size:13px; margin-bottom:10px; }
.person-item { padding:10px 12px; border:1px solid var(--border); border-radius:8px; margin-bottom:8px;
  background:var(--panel); transition:.12s; }
.person-item:hover { border-color:var(--border-hi); }
.person-item.sel { border-color:var(--cyan); background:var(--cyan-bg); }
.person-item .nm { font-weight:600; color:var(--text-bright); }
.person-item .meta { font-size:11px; color:var(--text-dim); font-family:var(--mono); margin-top:3px;
  display:flex; justify-content:space-between; align-items:center; gap:8px; }

/* ── Tables ── */
table.data { width:100%; border-collapse:collapse; font-size:12.5px; }
table.data th { text-align:left; color:var(--label); font-family:var(--mono); font-size:11px;
  text-transform:uppercase; letter-spacing:.4px; padding:8px 10px; border-bottom:1px solid var(--border); white-space:nowrap; }
table.data td { padding:8px 10px; border-bottom:1px solid var(--panel); color:var(--text); }
table.data tr:hover td { background:var(--panel); }
.num { font-family:var(--mono); text-align:right; }
.dim { color:var(--text-muted); }

/* ── Dimension bars ── */
.dimbar-wrap { display:flex; align-items:center; gap:12px; margin:9px 0; }
.dimbar-lbl { width:170px; font-size:12.5px; color:var(--text-dim); flex-shrink:0; }
.dimbar-track { flex:1; height:18px; background:var(--panel); border-radius:5px; overflow:hidden; border:1px solid var(--border); }
.dimbar-fill { height:100%; border-radius:4px 0 0 4px; transition:width .3s; }
.dimbar-val { width:62px; text-align:right; font-family:var(--mono); font-size:12px; color:var(--text-bright); flex-shrink:0; }
.dimbar-delta { width:42px; font-family:var(--mono); font-size:11px; flex-shrink:0; }

.weak-flag { margin-top:12px; padding:10px 14px; border-radius:8px; background:var(--amber-bg);
  border:1px solid var(--amber); border-left:3px solid var(--amber); color:var(--amber); font-size:12.5px; }

.filters { display:flex; gap:12px; flex-wrap:wrap; align-items:flex-end; }
.filters .f { display:flex; flex-direction:column; gap:4px; }
.filters label { font-size:10px; text-transform:uppercase; letter-spacing:.5px; color:var(--text-muted); font-family:var(--mono); }
.filters select, .filters input { background:var(--panel); border:1px solid var(--border); color:var(--text);
  border-radius:6px; padding:7px 9px; font-size:12.5px; min-width:130px; }

svg text { font-family:var(--mono); }
.legend { display:flex; gap:14px; flex-wrap:wrap; font-size:11px; font-family:var(--mono); color:var(--text-dim); margin-top:8px; }
.legend i { display:inline-block; width:10px; height:10px; border-radius:2px; margin-right:5px; vertical-align:middle; }
.muted-note { color:var(--text-muted); font-size:12px; font-style:italic; }
.export-bar { display:flex; gap:10px; justify-content:flex-end; margin-top:6px; }
</style>
</head>
<body>

<div id="topbar">
  <div id="brand">
    <span class="t" data-i18n="app.title">Bekwaamheidsdossier</span>
    <span class="s" data-i18n="app.subtitle">Live Scenario · run-registratie</span>
  </div>
  <span id="topstats"></span>
  <div class="spacer"></div>
  <button class="btn primary" onclick="pickFiles()" data-i18n="btn.import">＋ Importeer runs</button>
  <button class="btn ghost" onclick="loadFromCache()" data-i18n="btn.cache" data-i18n-title="btn.cache.title">⟳ Lokale cache</button>
  <button class="btn ghost danger" onclick="clearAll()" data-i18n="btn.clearAll">Wis alles</button>
  <div id="lang-toggle">
    <button class="lang-btn" data-lang="nl" onclick="setLang('nl')">NL</button>
    <button class="lang-btn" data-lang="en" onclick="setLang('en')">EN</button>
  </div>
  <input type="file" id="file-input" accept=".json,.lsrun,.lsrun.json,application/json" multiple class="hidden">
</div>

<div id="tabs" class="hidden">
  <button class="tab active" id="tab-ind" onclick="setView('individual')" data-i18n="tab.individual">Individueel dossier</button>
  <button class="tab" id="tab-coh" onclick="setView('cohort')" data-i18n="tab.cohort">Cohort-dashboard</button>
</div>

<div id="main">

  <!-- EMPTY STATE -->
  <div id="empty">
    <h1 style="font-size:22px" data-i18n="empty.h1">Van cursus gevolgd naar bekwaamheid aangetoond</h1>
    <p style="color:var(--text-dim);max-width:620px;margin:10px auto 0" data-i18n="empty.intro"></p>
    <div id="drop">
      <div class="ico">🗂</div>
      <h3 data-i18n="empty.drop">Sleep run-records hierheen</h3>
      <p data-i18n="empty.orChoose"></p>
      <p class="empty-hint" data-i18n="empty.hint"></p>
    </div>
  </div>

  <!-- INDIVIDUAL VIEW -->
  <div id="view-individual" class="hidden">
    <div id="ind-layout">
      <div>
        <input id="person-search" data-i18n-ph="search.ph" oninput="renderPersonList()">
        <div id="person-list"></div>
      </div>
      <div id="person-detail"><p class="muted-note" data-i18n="detail.pick">Kies links een deelnemer.</p></div>
    </div>
  </div>

  <!-- COHORT VIEW -->
  <div id="view-cohort" class="hidden">
    <div class="panel">
      <h2 data-i18n="panel.filters">Filters</h2>
      <div class="filters" id="cohort-filters">
        <div class="f"><label data-i18n="f.org">Organisatie</label><select id="f-org" onchange="renderCohort()"></select></div>
        <div class="f"><label data-i18n="f.variant">Variant</label><select id="f-variant" onchange="renderCohort()"></select></div>
        <div class="f"><label data-i18n="f.scenario">Scenario</label><select id="f-scenario" onchange="renderCohort()"></select></div>
        <div class="f"><label data-i18n="f.from">Vanaf</label><input type="date" id="f-from" onchange="renderCohort()"></div>
        <div class="f"><label data-i18n="f.to">Tot</label><input type="date" id="f-to" onchange="renderCohort()"></div>
        <button class="btn ghost" onclick="resetFilters()" data-i18n="f.reset">Reset</button>
      </div>
    </div>
    <div id="cohort-body"></div>
  </div>

</div>

/* ── Canonieke gedragslabels & competentie-dimensies ── */
const BEHAV = {
  'reactive':   { color:'var(--red)',   rank:1 },
  'aware':      { color:'var(--amber)', rank:2 },
  'proactive':  { color:'var(--blue)',  rank:3 },
  'in-control': { color:'var(--green)', rank:4 },
};
const BEHAV_ORDER = ['reactive','aware','proactive','in-control'];
const DIMENSIONS = [
  { key:'situational',   match:['situat','aware','bewust'] },
  { key:'communication', match:['commun','kommun'] },
  { key:'prioritisation',match:['prior'] },
  { key:'procedure',     match:['proced','verfahren'] },
  { key:'safe',          match:['veilig','safe','sicher','werken'] },
];
function canonDim(name){
  const n = (name||'').toLowerCase();
  for (const d of DIMENSIONS){ if (d.match.some(m => n.includes(m))) return d.key; }
  return null;
}
function behavLabel(b){ return b ? t('behav.'+b) : '—'; }
function dimLabel(key){ return t('dim.'+key); }
function varLabel(v){ const s=t('var.'+v); return s==='var.'+v ? (v||'—') : s; }

/* ── Helpers ── */
function $(id){ return document.getElementById(id); }
function esc(s){ return String(s==null?'':s).replace(/[&<>"]/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }
function behavOf(rec){
  const a = rec.assessment;
  if (a && a.behaviourLabel && BEHAV[a.behaviourLabel]) return a.behaviourLabel;
  const s = a && typeof a.score==='number' ? a.score : null;
  if (s==null) return null;
  return s<=3?'reactive':s<=5?'aware':s<=7?'proactive':'in-control';
}
function scoreOf(rec){ return (rec.assessment && typeof rec.assessment.score==='number') ? rec.assessment.score : null; }
function dateOf(rec){ return rec.completedAt || (rec.run && rec.run.endedAt) || null; }
function ts(rec){ const d = dateOf(rec); const t = d ? Date.parse(d) : NaN; return isNaN(t)?0:t; }
function dateLocale(){ return LANG==='en'?'en-GB':'nl-NL'; }
function fmtDate(iso){ if(!iso) return '—'; const tt=Date.parse(iso); if(isNaN(tt)) return '—';
  return new Date(tt).toLocaleDateString(dateLocale(),{day:'2-digit',month:'short',year:'numeric'}); }
function fmtDur(sec){ if(sec==null) return '—'; const m=Math.floor(sec/60), s=sec%60;
  return String(m).padStart(2,'0')+':'+String(s).padStart(2,'0'); }
function personKey(rec){ const p=rec.participant||{}; return ((p.name||'?').trim()+'|'+(p.org||'').trim()).toLowerCase(); }
function avg(arr){ const v=arr.filter(x=>typeof x==='number'); return v.length? v.reduce((a,b)=>a+b,0)/v.length : null; }
function round1(x){ return x==null?null:Math.round(x*10)/10; }
function dimColor(v){ if(v==null) return 'var(--text-muted)'; return v<2.5?'var(--red)':v<3.5?'var(--amber)':v<4.5?'var(--blue)':'var(--green)'; }
function runWord(n){ return n===1 ? t('run') : t('runs'); }

/* ── Import (WP5: validatie + nette meldingen) ── */
function pickFiles(){ $('file-input').click(); }
$('file-input').addEventListener('change', e => { handleFiles(e.target.files); e.target.value=''; });

function recordIsValid(r){
  return r && typeof r==='object' && typeof r.recordFormat==='string' && r.recordFormat.indexOf('livescenario-run')===0;
}
function rawRecords(parsed){
  if (Array.isArray(parsed)) return parsed;
  if (parsed && Array.isArray(parsed.records)) return parsed.records;   // bundel of {records:[]}
  if (parsed && typeof parsed==='object') return [parsed];
  return [];
}
function classify(parsed){
  const raw = rawRecords(parsed);
  const valid = raw.filter(recordIsValid);
  const newer = valid.filter(r => typeof r.recordVersion==='number' && r.recordVersion > RUN_SCHEMA_VERSION).length;
  return { valid, invalid: raw.length - valid.length, newer };
}
function extractRecords(parsed){ return classify(parsed).valid; }   // backward compat
function addRecords(recs){
  const seen = new Set(STATE.records.map(r=>r.runId));
  let added=0;
  recs.forEach(r=>{
    const id = r.runId || (r.runId = (r.variant||'x')+'-'+ts(r)+'-'+Math.random().toString().slice(2,6));
    if (!seen.has(id)){ STATE.records.push(r); seen.add(id); added++; }
  });
  STATE.records.sort((a,b)=>ts(a)-ts(b));
  return added;
}
function handleFiles(fileList){
  const files = Array.from(fileList||[]);
  if (!files.length) return;
  let pending=files.length, added=0, dup=0, invalid=0, newer=0, unread=0;
  files.forEach(f=>{
    const r = new FileReader();
    r.onload = () => {
      try { const c=classify(JSON.parse(r.result)); const a=addRecords(c.valid);
        added+=a; dup+=(c.valid.length-a); invalid+=c.invalid; newer+=c.newer; }
      catch(e){ unread++; console.warn('Import-fout in', f.name, e); }
      if (--pending===0) finishImport({added,dup,invalid,newer,unread});
    };
    r.onerror = () => { unread++; if(--pending===0) finishImport({added,dup,invalid,newer,unread}); };
    r.readAsText(f);
  });
}
function finishImport(s){
  const parts=[ t('imp.added',{n:s.added}) ];
  if (s.dup)     parts.push(t('imp.dup',{n:s.dup}));
  if (s.invalid) parts.push(t('imp.invalid',{n:s.invalid}));
  if (s.unread)  parts.push(t('imp.unreadable',{n:s.unread}));
  if (s.newer)   parts.push(t('imp.newer',{n:s.newer}));
  const kind = (s.unread||s.invalid||s.newer) ? 'amber' : (s.added ? 'green' : 'amber');
  flash(parts.join(' · '), kind);
  refreshAll();
}
function loadFromCache(){
  try {
    const raw = localStorage.getItem(STORE_KEY);
    if (!raw){ flash(t('cache.none'), 'amber'); return; }
    const added = addRecords(classify(JSON.parse(raw)).valid);
    flash(t('cache.loaded',{n:added}), added?'green':'amber');
    refreshAll();
  } catch(e){ flash(t('cache.error'), 'red'); }
}
function clearAll(){
  if (!STATE.records.length) return;
  if (!confirm(t('clearAll.confirm'))) return;
  STATE.records = []; STATE.selectedPersonKey = null; refreshAll();
}

['dragleave','drop'].forEach(ev=>document.addEventListener(ev, e=>{ e.preventDefault();

/* ── Toast ── */
let flashT=null;
function flash(msg, kind){
  let el = $('toast');
  if (!el){ el=document.createElement('div'); el.id='toast'; document.body.appendChild(el);
    el.style.cssText='position:fixed;bottom:22px;left:50%;transform:translateX(-50%);z-index:50;'+
    'padding:11px 18px;border-radius:8px;font-size:13px;font-family:var(--mono);box-shadow:0 6px 22px rgba(0,0,0,.5)'; }
  const c = kind==='red'?'--red':kind==='amber'?'--amber':'--green';
  el.style.background='var(--panel)'; el.style.border=`1px solid var(${c})`; el.style.color=`var(${c})`;
  el.textContent=msg; el.style.opacity='1';
  clearTimeout(flashT); flashT=setTimeout(()=>{ el.style.transition='opacity .4s'; el.style.opacity='0'; }, 3600);
}

function peopleIndex(){
  const map = new Map();
  STATE.records.forEach(r=>{
    const k = personKey(r);
    if (!map.has(k)) map.set(k, { key:k, name:(r.participant&&r.participant.name)||t('anon'),
      role:(r.participant&&r.participant.role)||'', org:(r.participant&&r.participant.org)||'', runs:[] });
    map.get(k).runs.push(r);
  });
  const list = [...map.values()];
  list.forEach(p=>p.runs.sort((a,b)=>ts(a)-ts(b)));
  list.sort((a,b)=>a.name.localeCompare(b.name, LANG));
  return list;
}

function personDimSeries(runs){
  const out = {};
  DIMENSIONS.forEach(d=>out[d.key]=[]);
  runs.forEach(r=>{
    const comps = (r.assessment && r.assessment.competencies) || [];
    comps.forEach(c=>{ const k=canonDim(c.name); if(k && typeof c.score==='number') out[k].push({ t:ts(r), val:c.score }); });
  });
  Object.values(out).forEach(a=>a.sort((x,y)=>x.t-y.t));
  return out;
}

/* ── Inline SVG line chart (score 1-10 over tijd) ── */
function lineChart(points){
  const pts = points.filter(p=>p.v!=null);
  const W=720, H=240, padL=34, padR=14, padT=14, padB=40;
  const iw=W-padL-padR, ih=H-padT-padB;
  const band=(lo,hi,col)=>{ const y1=padT+ih*(1-(hi)/10), y2=padT+ih*(1-(lo-1)/10);
    return `<rect x="${padL}" y="${y1.toFixed(1)}" width="${iw}" height="${(y2-y1).toFixed(1)}" fill="${col}" opacity="0.06"/>`; };
  let bands = band(1,3,'#ff4438')+band(4,5,'#ffc840')+band(6,7,'#52c0f8')+band(8,10,'#28f076');
  let grid='';
  for (let s=0;s<=10;s+=2){ const y=padT+ih*(1-s/10);
    grid+=`<line x1="${padL}" y1="${y.toFixed(1)}" x2="${W-padR}" y2="${y.toFixed(1)}" stroke="#3e5070" stroke-width="0.5"/>`;
    grid+=`<text x="${padL-6}" y="${(y+3).toFixed(1)}" fill="#60788e" font-size="9" text-anchor="end">${s}</text>`; }
  if (!pts.length) return `<svg viewBox="0 0 ${W} ${H}" width="100%">${bands}${grid}<text x="${W/2}" y="${H/2}" fill="#60788e" font-size="11" text-anchor="middle">${t('chart.noScores')}</text></svg>`;
  const n=pts.length;
  const xOf=i=> n===1 ? padL+iw/2 : padL + iw*(i/(n-1));
  const yOf=v=> padT + ih*(1-(v)/10);
  let path='', dots='', xlabels='';
  pts.forEach((p,i)=>{ const x=xOf(i), y=yOf(p.v);
    path += (i===0?'M':'L')+x.toFixed(1)+' '+y.toFixed(1)+' ';
    dots += `<circle cx="${x.toFixed(1)}" cy="${y.toFixed(1)}" r="4" fill="#00e8ff" stroke="#0f131c" stroke-width="1.5"><title>${esc(p.label)}: ${p.v}/10</title></circle>`;
    if (n<=8 || i===0 || i===n-1 || i%Math.ceil(n/8)===0)
      xlabels += `<text x="${x.toFixed(1)}" y="${H-padB+16}" fill="#60788e" font-size="8.5" text-anchor="middle">${esc(p.label)}</text>`;
  });
  return `<svg viewBox="0 0 ${W} ${H}" width="100%">${bands}${grid}
    <path d="${path}" fill="none" stroke="#00e8ff" stroke-width="2" stroke-linejoin="round"/>${dots}${xlabels}</svg>`;
}

/* ═══════════ COHORT-DASHBOARD ═══════════ */
function buildFilterOptions(){
  const recs = STATE.records;
  const fill = (id, vals, labeler) => {
    const sel = $(id); const cur = sel.value;
    const opts = [`<option value="">${t('f.all')}</option>`].concat(
      [...new Set(vals)].filter(Boolean).sort().map(v=>`<option value="${esc(v)}">${esc(labeler?labeler(v):v)}</option>`));
    sel.innerHTML = opts.join(''); if ([...sel.options].some(o=>o.value===cur)) sel.value=cur;
  };
  fill('f-org', recs.map(r=>r.participant&&r.participant.org));
  fill('f-variant', recs.map(r=>r.variant), v=>varLabel(v));
  fill('f-scenario', recs.map(r=>r.scenario&&(r.scenario.title||r.scenario.id)));
}
function resetFilters(){ ['f-org','f-variant','f-scenario'].forEach(id=>$(id).value=''); $('f-from').value=''; $('f-to').value=''; renderCohort(); }
function filteredRecords(){
  const org=$('f-org').value, va=$('f-variant').value, sc=$('f-scenario').value;
  const from=$('f-from').value?Date.parse($('f-from').value):null;
  const to=$('f-to').value?Date.parse($('f-to').value)+86400000:null;
  return STATE.records.filter(r=>{
    if (org && (r.participant&&r.participant.org)!==org) return false;
    if (va && r.variant!==va) return false;
    if (sc && (r.scenario&&(r.scenario.title||r.scenario.id))!==sc) return false;
    const t=ts(r); if (from && t<from) return false; if (to && t>=to) return false;
    return true;
  });
}
function renderCohort(){

  const normRuns = recs.filter(r=>r.run&&typeof r.run.withinNorm==='boolean');
  const withinNorm = normRuns.filter(r=>r.run.withinNorm).length;

  const bc={reactive:0,aware:0,proactive:0,'in-control':0,none:0};

  const dimAvg = DIMENSIONS.map(d=>({ key:d.key, av:avg(dimVals[d.key]), n:dimVals[d.key].length })).filter(d=>d.n>0);

    <div class="kpi"><div class="v">${people.size}</div><div class="l">${t('kpi.participants')}</div></div>
    <div class="kpi"><div class="v">${round1(avg(scores))??'—'}</div><div class="l">${t('kpi.avgScore')}</div><div class="sub">${t('kpi.outOf10')}</div></div>
    <div class="kpi"><div class="v">${holdPts}</div><div class="l">${t('kpi.holdpoints')}</div><div class="sub">${t('kpi.pctOfRuns',{p:(holdPts/recs.length*100).toFixed(0)})}</div></div>
    <div class="kpi" title="${esc(t('kpi.withinNorm.title'))}"><div class="v">${normRuns.length?Math.round(withinNorm/normRuns.length*100)+'%':'—'}</div><div class="l">${t('kpi.withinNorm')}</div><div class="sub">${t('kpi.normRuns',{a:normRuns.length,b:recs.length})}</div></div>
  </div></div>`;

  const total=recs.length;
  const seg = BEHAV_ORDER.map(b=> bc[b]?`<div title="${behavLabel(b)}: ${bc[b]}" style="width:${(bc[b]/total*100).toFixed(1)}%;background:${BEHAV[b].color};opacity:.85"></div>`:'').join('')
    + (bc.none?`<div title="${t('behav.unknown')}: ${bc.none}" style="width:${(bc.none/total*100).toFixed(1)}%;background:var(--text-muted);opacity:.5"></div>`:'');
  const behavPanel = `<div class="panel"><h2>${t('panel.behavDist')}</h2>

    <div class="legend">${BEHAV_ORDER.map(b=>`<span><i style="background:${BEHAV[b].color}"></i>${behavLabel(b)} ${bc[b]}</span>`).join('')}${bc.none?`<span><i style="background:var(--text-muted)"></i>${t('behav.unknown')} ${bc.none}</span>`:''}</div></div>`;

  const dimPanel = `<div class="panel"><h2>${t('panel.compAvg')}</h2>
    ${dimAvg.length? dimAvg.map(d=>`<div class="dimbar-wrap">
      <div class="dimbar-lbl">${dimLabel(d.key)}</div>
      <div class="dimbar-track"><div class="dimbar-fill" style="width:${(d.av/5*100).toFixed(0)}%;background:${dimColor(d.av)}"></div></div>
      <div class="dimbar-val">${round1(d.av)} / 5</div>
      <div class="dimbar-delta dim" title="${t('n.measurements')}">n=${d.n}</div>
    </div>`).join('') : `<p class="muted-note">${t('cohort.noComp')}</p>`}
    ${weakest? `<div class="weak-flag">${t('weakFlag',{dim:dimLabel(weakest.key),v:round1(weakest.av)})}</div>`:''}
  </div>`;

  const byPerson = new Map();
  recs.forEach(r=>{ const k=personKey(r); if(!byPerson.has(k)) byPerson.set(k,[]); byPerson.get(k).push(r); });
  const prows = [...byPerson.entries()].map(([k,rs])=>{
    rs.sort((a,b)=>ts(a)-ts(b)); const lastR=rs[rs.length-1]; const b=behavOf(lastR);
    const av=round1(avg(rs.map(scoreOf).filter(x=>x!=null)));
    const dv={}; DIMENSIONS.forEach(d=>dv[d.key]=[]);
    rs.forEach(r=>((r.assessment&&r.assessment.competencies)||[]).forEach(c=>{const ck=canonDim(c.name); if(ck&&typeof c.score==='number')dv[ck].push(c.score);}));
    const da=DIMENSIONS.map(d=>({key:d.key,av:avg(dv[d.key])})).filter(d=>d.av!=null).sort((a,b)=>a.av-b.av);
    const p=lastR.participant||{};
    return { name:p.name||t('anon'), org:p.org||'', n:rs.length, av, b, weak:da[0], last:ts(lastR) };
  }).sort((a,b)=> (a.av==null)-(b.av==null) || (a.av-b.av));
  const personPanel = `<div class="panel"><h2>${t('panel.participantsN',{n:prows.length})}</h2>

    <div class="export-bar">
      <button class="btn" onclick="exportCohortPDF()">${t('btn.pdfReport')}</button>

  body.innerHTML = kpis + behavPanel + dimPanel + disciplinePanel(recs, t('disc.titleCohort')) + scenarioPanelCohort(recs) + personPanel;
}

/* ═══════════ PRIORITERING & DISCIPLINE (WP2) ═══════════ */
function disciplineStats(records){
  const prio = { must:{done:0,total:0}, should:{done:0,total:0}, could:{done:0,total:0} };
  let hasPrio=false, lmraRuns=0, lmraDone=0, caught=0, interpreted=0, partial=0;
  records.forEach(r=>{
    const m = r.metrics || {};
    if (m.prioritisation){ hasPrio=true;
      ['must','should','could'].forEach(k=>{ const p=m.prioritisation[k]||{}; prio[k].done+=p.done||0; prio[k].total+=p.total||0; }); }
    if (m.lmra && m.lmra.total>0){ lmraRuns++; if (m.lmra.completed) lmraDone++; }
    if (typeof m.imperfectionsCaught==='number') caught+=m.imperfectionsCaught;
    if (typeof m.imperfectionsInterpreted==='number') interpreted+=m.imperfectionsInterpreted;
    if (typeof m.imperfectionsPartial==='number') partial+=m.imperfectionsPartial;
  });
  return { prio: hasPrio?prio:null, lmraRuns, lmraDone, caught, interpreted, partial };
}
function disciplinePanel(records, title){
  const s = disciplineStats(records);
  if (!s.prio && s.lmraRuns===0 && s.caught===0) return '';
  let prioHtml='';
  if (s.prio){
    const bar=(k,label,col)=>{ const tt=s.prio[k].total, d=s.prio[k].done, pct=tt?Math.round(d/tt*100):null;
      return `<div class="dimbar-wrap"><div class="dimbar-lbl">${label}</div>
        <div class="dimbar-track"><div class="dimbar-fill" style="width:${pct||0}%;background:${col}"></div></div>
        <div class="dimbar-val">${tt?pct+'%':'—'}</div><div class="dimbar-delta dim">${d}/${tt}</div></div>`; };
    prioHtml = `<div style="font-family:var(--mono);font-size:11px;color:var(--label);text-transform:uppercase;letter-spacing:.5px;margin:0 0 6px">${t('disc.prioHead')}</div>`
      + bar('must',t('disc.must'),'var(--green)')
      + bar('should',t('disc.should'),'var(--blue)')
      + bar('could',t('disc.could'),'var(--amber)');
  }
  const cells=[];
  if (s.lmraRuns>0) cells.push(`<div class="kpi"><div class="v">${Math.round(s.lmraDone/s.lmraRuns*100)}%</div><div class="l">${t('disc.lmra')}</div><div class="sub">${t('disc.lmraSub',{a:s.lmraDone,b:s.lmraRuns})}</div></div>`);
  if (s.caught>0) cells.push(`<div class="kpi"><div class="v">${s.interpreted}</div><div class="l">${t('disc.signal')}</div><div class="sub">${t('disc.signalSub',{a:s.caught,b:s.partial})}</div></div>`);
  const kpisHtml = cells.length?`<div class="kpis" style="margin-top:${s.prio?'14px':'0'}">${cells.join('')}</div>`:'';
  return `<div class="panel"><h2>${title}</h2>${prioHtml}${kpisHtml}</div>`;
}

/* ═══════════ PER SCENARIO ═══════════ */
function scenKey(r){ return (r.scenario && (r.scenario.id || r.scenario.title)) || '—'; }
function scenTitle(r){ return (r.scenario && (r.scenario.title || r.scenario.id)) || '—'; }
function scenarioBreakdown(records){
  const map = new Map();
  records.forEach(r=>{ const k=scenKey(r);
    if (!map.has(k)) map.set(k, { key:k, title:scenTitle(r), variant:r.variant, runs:[] });
    map.get(k).runs.push(r); });
  const list = [...map.values()];
  list.forEach(g=>g.runs.sort((a,b)=>ts(a)-ts(b)));
  return list;
}
function normPct(runs){
  const nr = runs.filter(r=>r.run && typeof r.run.withinNorm==='boolean');
  if (!nr.length) return '—';
  return Math.round(nr.filter(r=>r.run.withinNorm).length / nr.length * 100) + '%';
}
function scenarioPanelCohort(records){
  const groups = scenarioBreakdown(records);
  if (!groups.length) return '';
  const rows = groups.sort((a,b)=>b.runs.length-a.runs.length).map(g=>{
    const ppl = new Set(g.runs.map(personKey)).size;
    const av  = round1(avg(g.runs.map(scoreOf).filter(x=>x!=null)));
    const hp  = g.runs.filter(r=>r.run && r.run.endReason && r.run.endReason!=='completed').length;
    return `<tr>
      <td>${esc(g.title)}</td>
      <td><span class="vbadge ${g.variant}">${varLabel(g.variant)}</span></td>
      <td class="num">${g.runs.length}</td>
      <td class="num">${ppl}</td>
      <td class="num">${av!=null?av:'—'}</td>
      <td class="num">${normPct(g.runs)}</td>
      <td class="num">${hp||''}</td>
    </tr>`;
  }).join('');
  return `<div class="panel"><h2>${t('perScenario',{n:groups.length})}</h2>
    <table class="data"><thead><tr>
      <th>${t('th.scenario')}</th><th>${t('th.variant')}</th><th>${t('kpi.runs')}</th><th>${t('th.participants')}</th><th>${t('kpi.avgScore')}</th><th>${t('th.withinNorm')}</th><th>${t('th.holdpoints')}</th>
    </tr></thead><tbody>${rows}</tbody></table></div>`;
}
function scenarioPanelPerson(runs){
  if (runs.length <= 1) return '';
  const groups = scenarioBreakdown(runs);
  const rows = groups.sort((a,b)=>b.runs.length-a.runs.length).map(g=>{
    const sc = g.runs.map(scoreOf).filter(x=>x!=null);
    const trend = sc.length>1 ? `${sc[0]} → ${sc[sc.length-1]}` : (sc.length?String(sc[0]):'—');
    const b = behavOf(g.runs[g.runs.length-1]);
    return `<tr>
      <td>${esc(g.title)}</td>
      <td><span class="vbadge ${g.variant}">${varLabel(g.variant)}</span></td>
      <td class="num">${g.runs.length}</td>
      <td class="num">${trend}</td>
      <td class="num">${normPct(g.runs)}</td>
      <td>${b?`<span class="chip ${b}">${behavLabel(b)}</span>`:'—'}</td>
    </tr>`;
  }).join('');
  return `<div class="panel"><h2>${t('perScenario',{n:groups.length})}</h2>
    <table class="data"><thead><tr>
      <th>${t('th.scenario')}</th><th>${t('th.variant')}</th><th>${t('kpi.runs')}</th><th>${t('th.firstLast')}</th><th>${t('th.withinNorm')}</th><th>${t('th.level')}</th>
    </tr></thead><tbody>${rows}</tbody></table></div>`;
}

/* ═══════════ EXPORTS ═══════════ */
function loadXLSX(cb){
  if (typeof XLSX!=='undefined') return cb();
  const s=document.createElement('script');
  s.src='https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js';
  s.onload=cb; s.onerror=()=>flash(t('export.xlsxFail'),'red');
  document.head.appendChild(s);
}
function prioCell(p){ if(!p) return ''; return `${p.done||0}/${p.total||0}`; }
function runRow(r){
  const a=r.assessment||{}; const comp={};
  (a.competencies||[]).forEach(c=>{ const k=canonDim(c.name); if(k&&typeof c.score==='number') comp[k]=c.score; });
  const b=behavOf(r); const m=r.metrics||{}; const pr=m.prioritisation;
  const row={};
  row[t('th.date')]=fmtDate(dateOf(r));
  row[t('th.participant')]=(r.participant&&r.participant.name)||'';
  row[t('col.function')]=(r.participant&&r.participant.role)||'';
  row[t('th.org')]=(r.participant&&r.participant.org)||'';
  row[t('th.variant')]=varLabel(r.variant);
  row[t('th.scenario')]=(r.scenario&&(r.scenario.title||r.scenario.id))||'';
  row[t('col.type')]=(r.scenario&&r.scenario.type)||'';
  row[t('col.duration')]=fmtDur(r.run&&r.run.durationSec);
  row[t('th.outcome')]=(r.run&&r.run.endReason)||'';
  row[t('col.score')]=scoreOf(r)??'';
  row[t('col.level')]=b?behavLabel(b):'';
  row[t('col.comm')]=a.communicationScore??'';
  row[dimLabel('situational')]=comp.situational??'';
  row[dimLabel('communication')]=comp.communication??'';
  row[dimLabel('prioritisation')]=comp.prioritisation??'';
  row[dimLabel('procedure')]=comp.procedure??'';
  row[dimLabel('safe')]=comp.safe??'';
  row[t('col.mustDone')]=pr?prioCell(pr.must):'';
  row[t('col.shouldDone')]=pr?prioCell(pr.should):'';
  row[t('col.couldDone')]=pr?prioCell(pr.could):'';
  row[t('col.lmraDone')]=(m.lmra&&m.lmra.total>0)?(m.lmra.completed?t('yes'):t('no')):'';
  row[t('col.signalNoticed')]=m.imperfectionsCaught??'';
  row[t('col.signalInterpreted')]=m.imperfectionsInterpreted??'';
  row[t('col.summary')]=(a.summary||'').replace(/\s+/g,' ').slice(0,300);
  return row;
}
function sheetFrom(rows, name, fname){
  loadXLSX(()=>{
    const wb=XLSX.utils.book_new();
    const ws=XLSX.utils.json_to_sheet(rows);
    const WIDE=[t('col.summary')], MED=[t('th.scenario'),t('th.participant'),t('th.org'),t('col.function')];
    ws['!cols']=Object.keys(rows[0]||{x:1}).map(k=>({wch: WIDE.includes(k)?60: MED.includes(k)?24:14}));
    XLSX.utils.book_append_sheet(wb, ws, name.slice(0,31));
    XLSX.writeFile(wb, fname);
  });
}
function exportCohortExcel(){
  const rows=filteredRecords().map(runRow);
  if (!rows.length) return flash(t('export.none'),'amber');
  sheetFrom(rows, t('app.title'), `${t('app.title').replace(/\s+/g,'_')}_cohort_${new Date().toISOString().slice(0,10)}.xlsx`);
}
function exportPersonExcel(){
  const p=peopleIndex().find(x=>x.key===STATE.selectedPersonKey); if(!p) return;

      <td>${scoreOf(r)??'—'}</td><td class="${PCLS[b]||''}">${behavLabel(b)}</td></tr>`;}).join('');
  const inner=`<h1>${t('pdf.dossierTitle',{name:esc(p.name)})}</h1>
    <div class="sub">${esc([p.role,p.org].filter(Boolean).join(' · '))} · ${t('pdf.generated',{d:fmtDate(new Date().toISOString())})}</div>
    <div class="kpi"><b>${runs.length}</b>${t('stats.runs')}</div>
    <div class="kpi"><b>${round1(avg(scores))??'—'}</b>${t('pdf.avgScore10')}</div>
    <div class="kpi"><b class="${PCLS[bl]||''}">${behavLabel(bl)}</b>${t('detail.currentLevel')}</div>
    <div class="kpi"><b>${fmtDate(dateOf(runs[0]))}<br>${fmtDate(dateOf(last))}</b>${t('pdf.period')}</div>
    <h2>${t('pdf.compDevFL')}</h2>
    <table><tr><th>${t('th.dimension')}</th><th>${t('th.average')}</th><th>${t('th.trend')}</th></tr>${dimHtml||`<tr><td colspan=3>${t('pdf.noComp')}</td></tr>`}</table>
    <h2>${t('panel.runsN',{n:runs.length})}</h2>
    <table><tr><th>${t('th.date')}</th><th>${t('th.variant')}</th><th>${t('th.scenario')}</th><th>${t('th.duration')}</th><th>${t('th.outcome')}</th><th>${t('th.score')}</th><th>${t('th.level')}</th></tr>${rowsHtml}</table>`;
  printHTML(t('pdf.dossierTitle',{name:p.name}), inner);
}
function exportCohortPDF(){
  const recs=filteredRecords(); if(!recs.length) return flash(t('export.none'),'amber');
  const people=new Set(recs.map(personKey)); const scores=recs.map(scoreOf).filter(x=>x!=null);
  const holdPts=recs.filter(r=>r.run&&r.run.endReason&&r.run.endReason!=='completed').length;
  const dimVals={}; DIMENSIONS.forEach(d=>dimVals[d.key]=[]);
  recs.forEach(r=>((r.assessment&&r.assessment.competencies)||[]).forEach(c=>{const k=canonDim(c.name);if(k&&typeof c.score==='number')dimVals[k].push(c.score);}));
  const dimAvg=DIMENSIONS.map(d=>({key:d.key,av:avg(dimVals[d.key]),n:dimVals[d.key].length})).filter(d=>d.av!=null);
  const weakest=dimAvg.slice().sort((a,b)=>a.av-b.av)[0];
  const dimHtml=dimAvg.map(d=>`<tr><td>${dimLabel(d.key)}</td><td>${round1(d.av)} / 5</td><td>${d.n}</td></tr>`).join('');
  const fdesc=[[t('f.org'),$('f-org').value],[t('f.variant'),varLabel($('f-variant').value)],[t('f.scenario'),$('f-scenario').value],[t('f.from'),$('f-from').value],[t('f.to'),$('f-to').value]].filter(x=>x[1]).map(x=>x[0]+': '+x[1]).join(' · ')||t('pdf.allRuns');
  const inner=`<h1>${t('pdf.cohortTitle')}</h1>
    <div class="sub">${t('pdf.filter',{f:esc(fdesc),d:fmtDate(new Date().toISOString())})}</div>
    <div class="kpi"><b>${recs.length}</b>${t('stats.runs')}</div>
    <div class="kpi"><b>${people.size}</b>${t('stats.participants')}</div>
    <div class="kpi"><b>${round1(avg(scores))??'—'}</b>${t('pdf.avgScore10')}</div>
    <div class="kpi"><b>${holdPts}</b>${t('th.holdpoints')}</div>
    <h2>${t('pdf.compAvg')}</h2>
    <table><tr><th>${t('th.dimension')}</th><th>${t('th.average')}</th><th>${t('th.measurements')}</th></tr>${dimHtml||`<tr><td colspan=3>${t('pdf.noScores')}</td></tr>`}</table>
    ${weakest?`<div class="flag">${t('pdf.weakFlag',{dim:dimLabel(weakest.key),v:round1(weakest.av)})}</div>`:''}`;
  printHTML(t('pdf.cohortTitle'), inner);
}

/* init */
document.querySelectorAll('.lang-btn').forEach(b=>b.classList.toggle('active', b.dataset.lang===LANG));
applyStaticI18n();
refreshAll();
</script>
